# Global settings for golangci-lint
version: "2"

linters-settings:
  cyclop:
    max-complexity: 10
    package-average: 5.0
  gocyclo:
    min-complexity: 5

linters:
  enable:
    - cyclop
    - gocyclo
    - revive
    - staticcheck
    - gosec
    - govet
    - dupl
    - goconst
    - gocritic

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0

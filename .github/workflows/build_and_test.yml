name: Build and test

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build with Makefile
        run: make build

  test:
    needs: build
    runs-on: ubuntu-latest
    
    # Важно для testcontainers - нужен доступ к Docker
    services:
      docker:
        image: docker:dind
        options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      # Устанавливаем Docker (если не используется сервис)
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      # Важно: testcontainers требует Docker
      - name: Run integration tests with Testcontainers
        run: make test-integration
        env:
          # Для testcontainers в CI среде
          TESTCONTAINERS_RYUK_DISABLED: true
          # Для лучшей производительности
          TESTCONTAINERS_CHECKS_DISABLE: true
          # Явно указываем хост Docker
          DOCKER_HOST: unix:///var/run/docker.sock
